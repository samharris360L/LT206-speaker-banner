<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Learning Technologies London — Session Carousel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:ital,wght@0,400;0,500;0,600;0,700;0,800;1,500&display=swap" rel="stylesheet">
<style>
  /* ---------- 360Learning brand tokens ---------- */
  :root{
    --ink:        #18191D;
    --ink-soft:   #212227;
    --latte:      #FBF6F2;
    --blue:       #5185F6;
    --yellow:     #FFD456;
    --green:      #4AC995;
    --purple:     #B085EE;

    --radius-lg: 24px;
    --shadow-card: 0 1px 0 rgba(24,25,29,.04), 0 24px 56px -28px rgba(24,25,29,.28);
  }

  *, *::before, *::after { box-sizing: border-box; }

  html, body{
    margin: 0;
    padding: 0;
    background: transparent;
  }
  body{
    font-family: 'Plus Jakarta Sans', system-ui, sans-serif;
    color: var(--ink);
    display: flex;
    align-items: center;
    justify-content: center;
    letter-spacing: -0.01em;
    overflow: hidden;
  }

  /* ---------- Hero shell ---------- */
  .hero{
    width: min(1080px, 100%);
    background: var(--ink);
    border-radius: var(--radius-lg);
    overflow: hidden;
    box-shadow: var(--shadow-card);
    position: relative;
    animation: rise .7s cubic-bezier(.2,.7,.2,1) both;
  }
  @keyframes rise {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ---------- Event strip ---------- */
  .event-strip{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    padding: 14px 22px;
    background: linear-gradient(90deg, #0E6B4A 0%, var(--ink) 60%);
    border-bottom: 1px solid rgba(255,255,255,.06);
    color: #fff;
    position: relative;
    z-index: 2;
  }
  .event-strip .event-left{
    display: flex;
    align-items: center;
    gap: 12px;
    min-width: 0;
  }
  .event-strip .live-dot{
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--yellow);
    box-shadow: 0 0 0 0 rgba(255,212,86,.6);
    animation: pulse 2s ease-in-out infinite;
    flex-shrink: 0;
  }
  @keyframes pulse {
    0%   { box-shadow: 0 0 0 0 rgba(255,212,86,.6); }
    70%  { box-shadow: 0 0 0 10px rgba(255,212,86,0); }
    100% { box-shadow: 0 0 0 0 rgba(255,212,86,0); }
  }
  .event-strip .event-label{
    font-size: 11px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--yellow);
    white-space: nowrap;
  }
  .event-strip .event-meta{
    font-size: 12.5px;
    font-weight: 600;
    color: rgba(255,255,255,.65);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .event-strip .event-meta strong{
    color: #fff;
    font-weight: 700;
  }

  /* ---------- Carousel ---------- */
  .carousel{
    position: relative;
    width: 100%;
    aspect-ratio: 1080 / 560;
    background: var(--ink);
    overflow: hidden;
  }

  .slides{
    position: absolute;
    inset: 0;
  }

  .slide{
    position: absolute;
    inset: 0;
    opacity: 0;
    transform: scale(1.04);
    transition: opacity .7s cubic-bezier(.4,0,.2,1), transform 6s ease-out;
    pointer-events: none;
  }
  .slide.active{
    opacity: 1;
    transform: scale(1);
    pointer-events: auto;
  }

  .slide img{
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: auto;
    height: 100%;
    max-width: none;
    display: block;
  }

  /* When viewport is wider than tall slide, stretch image */
  @media (min-aspect-ratio: 1080/560) {
    .slide img { height: auto; width: 100%; }
  }

  /* Dark fade at bottom for badge contrast */
  .carousel::after{
    content: "";
    position: absolute;
    left: 0; right: 0; bottom: 0;
    height: 110px;
    background: linear-gradient(to top, rgba(24,25,29,.85), rgba(24,25,29,0));
    pointer-events: none;
    z-index: 1;
  }

  /* ---------- Session badge (per slide) ---------- */
  .session-info{
    position: absolute;
    left: 22px; right: 22px; bottom: 22px;
    z-index: 2;
    color: #fff;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 16px;
    pointer-events: none;
  }

  .session-info .meta{
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity .6s ease .2s, transform .6s ease .2s;
  }
  .slide.active ~ .session-info .meta,
  .session-info.active .meta{
    opacity: 1;
    transform: translateY(0);
  }

  .chip{
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    background: rgba(255,255,255,.1);
    color: #fff;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    border: 1px solid rgba(255,255,255,.18);
    white-space: nowrap;
  }
  .chip svg{ width: 12px; height: 12px; }
  .chip.accent{
    background: var(--yellow);
    color: var(--ink);
    border-color: var(--yellow);
  }

  /* ---------- Nav arrows ---------- */
  .nav{
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    z-index: 3;
    width: 44px; height: 44px;
    border-radius: 50%;
    background: rgba(24,25,29,.55);
    border: 1px solid rgba(255,255,255,.18);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    transition: background .2s ease, transform .2s ease, border-color .2s ease;
    font-family: inherit;
  }
  .nav:hover{
    background: var(--yellow);
    color: var(--ink);
    border-color: var(--yellow);
    transform: translateY(-50%) scale(1.08);
  }
  .nav:focus-visible{
    outline: 2px solid var(--yellow);
    outline-offset: 3px;
  }
  .nav.prev{ left: 16px; }
  .nav.next{ right: 16px; }
  .nav svg{ width: 18px; height: 18px; }

  /* ---------- Timeline dots ---------- */
  .dots{
    position: absolute;
    left: 0; right: 0; bottom: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    z-index: 3;
    pointer-events: none;
  }
  .dot{
    width: 28px; height: 4px;
    border-radius: 999px;
    background: rgba(255,255,255,.25);
    border: 0;
    cursor: pointer;
    padding: 0;
    overflow: hidden;
    position: relative;
    transition: background .3s ease;
    pointer-events: auto;
  }
  .dot::after{
    content: "";
    position: absolute;
    inset: 0;
    background: var(--yellow);
    transform: translateX(-100%);
  }
  .dot.active{
    background: rgba(255,255,255,.35);
  }
  .dot.active::after{
    animation: fill 6s linear forwards;
  }
  .carousel.paused .dot.active::after{
    animation-play-state: paused;
  }
  @keyframes fill {
    to { transform: translateX(0); }
  }

  /* ---------- Speaker strip below carousel ---------- */
  .speakers{
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 1px;
    background: rgba(255,255,255,.06);
  }
  .speaker-tab{
    background: var(--ink);
    padding: 14px 18px;
    color: #fff;
    border: 0;
    font-family: inherit;
    text-align: left;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: background .2s ease;
    min-width: 0;
  }
  .speaker-tab:hover{
    background: var(--ink-soft);
  }
  .speaker-tab:focus-visible{
    outline: 2px solid var(--yellow);
    outline-offset: -2px;
  }
  .speaker-tab.active{
    background: linear-gradient(180deg, var(--ink-soft) 0%, var(--ink) 100%);
  }
  .speaker-tab.active .tab-title{ color: var(--yellow); }

  .speaker-tab .tab-row{
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }
  .speaker-tab .tab-day{
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,.5);
  }
  .speaker-tab.active .tab-day{ color: var(--yellow); }
  .speaker-tab .tab-time{
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,.55);
    white-space: nowrap;
  }
  .speaker-tab .tab-title{
    font-size: 13.5px;
    font-weight: 700;
    color: #fff;
    letter-spacing: -0.01em;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    transition: color .2s ease;
  }
  .speaker-tab .tab-speaker{
    font-size: 11.5px;
    font-weight: 500;
    color: rgba(255,255,255,.55);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  /* ---------- Responsive ---------- */
  @media (prefers-reduced-motion: reduce) {
    .event-strip .live-dot,
    .slide,
    .dot.active::after { animation: none !important; transition: none !important; }
  }

  @media (max-width: 720px){
    .event-strip{ padding: 12px 16px; }
    .event-strip .event-meta{ display: none; }
    .carousel{ aspect-ratio: 1 / 1; }
    .speakers{ grid-template-columns: 1fr; }
    .speaker-tab{ padding: 12px 16px; }
    .nav{ width: 38px; height: 38px; }
    .nav.prev{ left: 10px; }
    .nav.next{ right: 10px; }
    .session-info{ left: 14px; right: 14px; bottom: 48px; }
    .chip{ font-size: 11px; padding: 5px 10px; }
  }
</style>
</head>
<body>

<section class="hero" aria-label="Learning Technologies London 2026 session showcase">

  <!-- Event strip -->
  <div class="event-strip">
    <div class="event-left">
      <span class="live-dot" aria-hidden="true"></span>
      <span class="event-label">Learning Technologies London</span>
    </div>
    <div class="event-meta">
      <strong>29–30 April 2026</strong> &nbsp;·&nbsp; ExCeL London &nbsp;·&nbsp; Booth E15
    </div>
  </div>

  <!-- Carousel -->
  <div class="carousel" id="carousel">

    <div class="slides" id="slides">
      <!-- Slide 1: James Clemence — April 29, 11:45am -->
      <div class="slide active" data-index="0">
        <img src="./session-1-clemence.png" alt="Global Scale, Local Impact: Merlin Entertainments' Journey to Decentralised L&D — James Clemence, April 29, Theater 1">
      </div>

      <!-- Slide 2: Lee Eccles — April 29, 14:50 -->
      <div class="slide" data-index="1">
        <img src="./session-2-eccles.png" alt="Immersive professional simulation: AI that puts you in real-life conditions — Lee Eccles, April 29, Bitesize Learning Zone 1">
      </div>

      <!-- Slide 3: David James — April 30, 12:30pm -->
      <div class="slide" data-index="2">
        <img src="./session-3-james.png" alt="Beyond the Bot: How Your Influence Is the Only AI-Proof Strategy — David James, April 30, Theater 1">
      </div>
    </div>

    <!-- Slide meta badges (updated by JS) -->
    <div class="session-info active" id="sessionInfo">
      <div class="meta" id="slideMeta">
        <span class="chip accent">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><rect x="3" y="4" width="18" height="18" rx="2" ry="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          <span id="chipDate">April 29</span>
        </span>
        <span class="chip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          <span id="chipTime">11:45am – 12:15pm</span>
        </span>
        <span class="chip">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0Z"/><circle cx="12" cy="10" r="3"/></svg>
          <span id="chipPlace">Theater 1</span>
        </span>
      </div>
    </div>

    <!-- Nav arrows -->
    <button class="nav prev" id="prevBtn" aria-label="Previous session">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </button>
    <button class="nav next" id="nextBtn" aria-label="Next session">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    </button>

    <!-- Timeline dots -->
    <div class="dots" role="tablist">
      <button class="dot active" data-goto="0" aria-label="Go to session 1" role="tab"></button>
      <button class="dot" data-goto="1" aria-label="Go to session 2" role="tab"></button>
      <button class="dot" data-goto="2" aria-label="Go to session 3" role="tab"></button>
    </div>

  </div>

  <!-- Speaker tabs -->
  <div class="speakers">
    <button class="speaker-tab active" data-goto="0">
      <div class="tab-row">
        <span class="tab-day">Day 1 · Apr 29</span>
        <span class="tab-time">11:45</span>
      </div>
      <div class="tab-title">Global Scale, Local Impact</div>
      <div class="tab-speaker">James Clemence · Merlin Entertainments</div>
    </button>
    <button class="speaker-tab" data-goto="1">
      <div class="tab-row">
        <span class="tab-day">Day 1 · Apr 29</span>
        <span class="tab-time">14:50</span>
      </div>
      <div class="tab-title">Immersive Professional Simulation</div>
      <div class="tab-speaker">Lee Eccles · 360Learning</div>
    </button>
    <button class="speaker-tab" data-goto="2">
      <div class="tab-row">
        <span class="tab-day">Day 2 · Apr 30</span>
        <span class="tab-time">12:30</span>
      </div>
      <div class="tab-title">Beyond the Bot</div>
      <div class="tab-speaker">David James · 360Learning</div>
    </button>
  </div>

</section>

<script>
(function() {
  const carousel = document.getElementById('carousel');
  const slides = document.querySelectorAll('.slide');
  const dots = document.querySelectorAll('.dot');
  const tabs = document.querySelectorAll('.speaker-tab');
  const chipDate = document.getElementById('chipDate');
  const chipTime = document.getElementById('chipTime');
  const chipPlace = document.getElementById('chipPlace');

  const slideData = [
    { date: "April 29", time: "11:45am – 12:15pm", place: "Theater 1" },
    { date: "April 29", time: "14:50pm – 15:05pm", place: "Bitesize Learning Zone 1" },
    { date: "April 30", time: "12:30pm – 1:00pm", place: "Theater 1" }
  ];

  let currentIndex = 0;
  let intervalId = null;
  const AUTO_DELAY = 6000;

  function goTo(index) {
    currentIndex = (index + slides.length) % slides.length;

    slides.forEach((s, i) => s.classList.toggle('active', i === currentIndex));
    dots.forEach((d, i) => d.classList.toggle('active', i === currentIndex));
    tabs.forEach((t, i) => t.classList.toggle('active', i === currentIndex));

    const data = slideData[currentIndex];
    chipDate.textContent = data.date;
    chipTime.textContent = data.time;
    chipPlace.textContent = data.place;

    // re-trigger meta animation
    const meta = document.getElementById('slideMeta');
    meta.style.animation = 'none';
    meta.offsetHeight; // reflow
    meta.style.animation = '';
  }

  function next() { goTo(currentIndex + 1); }
  function prev() { goTo(currentIndex - 1); }

  function startAuto() {
    stopAuto();
    intervalId = setInterval(next, AUTO_DELAY);
    carousel.classList.remove('paused');
  }
  function stopAuto() {
    if (intervalId) { clearInterval(intervalId); intervalId = null; }
    carousel.classList.add('paused');
  }

  // Controls
  document.getElementById('nextBtn').addEventListener('click', () => { next(); startAuto(); });
  document.getElementById('prevBtn').addEventListener('click', () => { prev(); startAuto(); });

  dots.forEach(d => d.addEventListener('click', () => {
    goTo(parseInt(d.dataset.goto, 10));
    startAuto();
  }));

  tabs.forEach(t => t.addEventListener('click', () => {
    goTo(parseInt(t.dataset.goto, 10));
    startAuto();
  }));

  // Pause on hover
  carousel.addEventListener('mouseenter', stopAuto);
  carousel.addEventListener('mouseleave', startAuto);

  // Pause when tab/window not visible (saves battery)
  document.addEventListener('visibilitychange', () => {
    if (document.hidden) stopAuto(); else startAuto();
  });

  // Keyboard nav
  carousel.setAttribute('tabindex', '0');
  carousel.addEventListener('keydown', (e) => {
    if (e.key === 'ArrowRight') { next(); startAuto(); }
    else if (e.key === 'ArrowLeft') { prev(); startAuto(); }
  });

  // Respect reduced motion
  const reduced = window.matchMedia('(prefers-reduced-motion: reduce)').matches;
  if (!reduced) {
    startAuto();
  }
})();
</script>

</body>
</html>
